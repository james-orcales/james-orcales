name: Lint

permissions:
  contents: read

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  workflow_dispatch:
  merge_group:
  pull_request:
  push:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --filter=blob:none --depth=200 "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}" .
          git checkout "${{ github.sha }}"

      - name: Set up Go
        run: |
          ./install_golang.sh

      - name: Test
        run: |
          go run ./lint
          go run build.go test

  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --filter=blob:none --depth=200 "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}" .
          git checkout "${{ github.sha }}"

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy --no-self-update
          rustup default stable

      - name: Build, test, clippy
        run: |
          cargo build --workspace --locked
          cargo test --workspace --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Enforce the dialect
        run: |
          for crate in lint_rs shared_rs sloc_rs; do
            cargo run -q -p lint_rs --locked -- "${crate}/src" || exit 1
          done
